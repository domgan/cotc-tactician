speed_tuning_notes: |
  Standard turtle pacing — debuffs and heals before DPS acts.
  Rinyuu EX healing is disrupted when bosses force front/back row swaps.

turn_plan:
  - turn_range: "1-5"
    phase: setup
    actions:
      - "Signa + Viola: Stack defense debuffs to 30% cap"
      - "Richard + Bargello: Apply damage buffs"
      - "Kilns: Provoke tank big hits"
      - "Rinyuu EX + Temenos: Maintain HP through AoE patterns"
    notes: "Slow and steady — survive before pushing break"

  - turn_range: "6+"
    phase: sustain
    actions:
      - "Hikari: Chip damage during break windows"
      - "Repeat debuff/heal cycle each break cycle"
    notes: "Average 10–15 turns; ~20 on slow AoE bosses"

why_it_works: |
  Community-reported universal turtle for nearly all EX3 up to Lv75 Adversary Log.
  Hikari + Signa/Viola debuff stack + Kilns provoke + Rinyuu EX healing covers most
  standard EX3 patterns without premium units. Average clear ~10–15 turns.

  FAILS ON: gimmick bosses (arena refights, Lv120 NPC), forced backrow swaps,
  ignore-taunt mechanics, sub-50% HP enrage requiring 1–2 break kills, Ri'tu
  (element-only), B'aal Airy (needs big burst). Difficulty spike at Saint/Orsazantos EX3.

key_synergies:
  - "Signa + Viola: Stack P.DEF/E.DEF debuffs to cap"
  - "Richard + Hikari: Physical damage buff stacking"
  - "Rinyuu EX + Temenos: Dual-healer sustain"
  - "Kilns provoke: Absorbs single-target while team debuffs"

risks_and_recovery:
  - "Risk: Boss forces row swap — Rinyuu EX can't heal front row"
  - "Recovery: Swap to Cecil cover team or boss-specific comp"
  - "Risk: Enrage below 50% HP on gimmick bosses"
  - "Recovery: Build burst team for those specific fights"
  - "Risk: Ignore-taunt bosses bypass Kilns"
  - "Recovery: Switch to dodge/cover tank (Canary, Cecil, Fiore EX)"

