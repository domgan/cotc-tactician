speed_tuning_notes: |
  Shields don't matter — burst on T3. Craft weapons per enemy weakness.
  Xerc AU + 3BP pet enables 200% ult T1; without AU delay burst 1 turn.

turn_plan:
  - turn_range: "1-2"
    phase: setup
    actions:
      - "Isla + Crick: Enable Hikari EX / Xerc damage setup"
      - "Dark Priestess: Weakness exploitation window"
      - "Osvald EX: Potency ult (apply 1 turn before burst if 3T window)"
      - "Shana: SP/BP or Unsinkable if needed"
    notes: "Setup buffs before T3 burst"

  - turn_range: "3"
    phase: burst
    actions:
      - "Xerc + Osvald EX + Hikari EX: Full rainbow burst"
      - "Lemaire: Rainbow damage contribution"
    notes: "Clears most EX3 including Saint Sazantos per author"

why_it_works: |
  Budget-ish hybrid rainbow using Hikari EX + Crick instead of full premium rainbow core.
  Xerc FUA + Osvald EX FUA carry damage; DP enables weakness hits on crafted weapons.
  Clears most EX3 in 3 turns when shields are irrelevant to strategy.

  Exceptions: Kagemune EX3 (hard stop), Kaine EX3 and Lutiya EX3 (need tweaks).

key_synergies:
  - "Crick + Hikari EX: Hybrid damage enablement"
  - "Xerc + Isla: Scholar EX skill + elem atk passives"
  - "Dark Priestess + crafted weapons: Weakness coverage"
  - "Osvald EX + Xerc: Multi-element FUA chain"

risks_and_recovery:
  - "Risk: Kagemune EX3 clone/dodge mechanics"
  - "Recovery: Use dedicated Kagemune team (ST only, turtle, or Rondo EX 3T whale)"
  - "Risk: Missing Xerc"
  - "Recovery: DK/Pardis/Odio O/Kaine + Mydia + Molrusso/DP physical fallback"
  - "Risk: Missing Signa A4 on Isla"
  - "Recovery: Lose one Crick debuff — still enough for most EX3"

