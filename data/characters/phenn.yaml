# Roles — from skill kit + GL launch community guides
roles: [buffer, debuffer, dps, tank]
tank_type: cover
role_notes: |
  Physical-meta enabler from OT0. Builds Heart of Resilience (HoR) when front-row allies
  use sword/axe/bow/staff attacks — each FUA grants +3 HoR and a 20% max HP barrier.
  HoR 3+/6+/9+ scales party-wide debuffs (P.Atk/P.Def, weapon res, P.Def cap raise).
  Cover skill (2×/battle) + self HP barriers; A4 starts battle with 50% HP barrier.
  9 HoR finishers: guaranteed crit + 1.5× potency on big bow/axe hits (consumes stacks).
  Ult buffs warriors/apothecaries/hunters/clerics with 100% potency + dmg cap + AOE nuke.
  Not a must-pull like Xerc (Drayleb) but strong cornerstone for physical teams until Saga powercreep.

usage_strategy: |
  Front-row slot on physical teams with 3–4 sword/axe/bow/staff attackers to stack HoR fast.
  Maintain HP barrier (passive FUA, A4 start, 4★ cover skill, full-HP heal bonus) for party
  buffs (+10% P.Atk/P.Def, +50k cap) and physical counter. Build to 9 HoR before firing
  2★/5★ bow finishers for guaranteed crit burst. Ult on break/setup turns for 100% potency
  on physical jobs; 200% gauge doubles the AOE hit. Often back-loaded after barrier setup;
  pairs with Pardis III, Ditraina EX, Kaine, Mahrez, Edgar per community clears.

best_use_cases:
  - "Physical DPS teams needing stacked debuffs + damage cap support"
  - "Cover + barrier sustain when Fiore EX unavailable or vs mixed physical pressure"
  - "Speedclear setups — community reports 2.7M×2 damage potential at cap (CN/JP testing)"
  - "Kagemune EX3 3T and Pardis III EX3 one-action clears (BrickSuccessful4703 showcases)"

weaknesses:
  - "HoR loop requires active front-row physical attackers — slow in solo-carry lineups"
  - "9 HoR finishers reset stacks — timing matters; wasted stacks if barrier drops"
  - "Limited weakness coverage (bow + axe only) — not a rainbow slot"
  - "No Blessing of Lantern / Limit Break on GL launch (OT0 seasonal pattern)"
  - "Powercrept horizon: Romancing SaGa 2 (~6 months per BrickSuccessful4703 meta analysis)"

